<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company.name }} - 公司詳情</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

    <div class="container mx-auto px-4 py-10 max-w-4xl">
        
        <!-- 返回按鈕 -->
        <div class="mb-6">
            <!-- javascript:history.back() 可讓網頁回上一頁並保留剛才的搜尋條件 -->
            <a href="javascript:history.back()" class="inline-flex items-center text-slate-500 hover:text-blue-600 transition-colors font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                返回搜尋結果
            </a>
        </div>

        <!-- 內容卡片 -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            
            <!-- 卡片頂部設計 (Cover Header) -->
            <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            
            <div class="px-8 pb-10">
                <!-- 標題與產業標籤 -->
                <div class="-mt-12 mb-6 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 inline-block">
                        <h1 class="text-3xl font-extrabold text-slate-800 leading-tight">{{ company.name }}</h1>
                    </div>
                    <div class="mb-2 sm:mb-4">
                        <span class="bg-indigo-100 text-indigo-700 py-2 px-4 rounded-full text-sm font-bold tracking-wide border border-indigo-200 shadow-sm">
                            {{ company.industry }}
                        </span>
                    </div>
                </div>

                <!-- 資訊區塊 (地點與網站) -->
                <div class="flex flex-col sm:flex-row gap-6 mb-10 pb-8 border-b border-slate-100">
                    <div class="flex items-center text-slate-600">
                        <div class="bg-slate-100 p-2.5 rounded-full mr-3 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-0.5">公司地點</p>
                            <p class="font-medium text-slate-800">{{ company.location }}</p>
                        </div>
                    </div>

                    {% if company.website %}
                    <div class="flex items-center text-slate-600">
                        <div class="bg-slate-100 p-2.5 rounded-full mr-3 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-0.5">官方網站</p>
                            <a href="{{ company.website }}" target="_blank" rel="noopener noreferrer" class="font-medium text-blue-600 hover:text-blue-800 hover:underline">
                                {{ company.website }}
                            </a>
                        </div>
                    </div>
                    {% endif %}
                </div>

                <!-- 簡介內容 -->
                <div>
                    <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        關於 {{ company.name }}
                    </h2>
                    <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                        <!-- 使用 linebreaksbr 讓資料庫裡的換行可以正常顯示 -->
                        <p class="text-slate-600 leading-relaxed text-lg whitespace-pre-line">{{ company.description }}</p>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
    
</body>
</html>
